name: Build Go

on:
  push:
    branches: [ "rewrite/go" ]
  pull_request:
    branches: [ "rewrite/go" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install frontend dependencies
      working-directory: frontend
      run: npm install

    - name: Build frontend
      working-directory: frontend
      run: npm run build

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test ./...

    - name: Create dist directory
      run: New-Item -ItemType Directory -Force dist | Out-Null

    - name: Build WebView2 application binary
      run: go build -trimpath -ldflags "-s -w -H windowsgui" -o dist/mcc-webview2.exe ./cmd/mcc

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcc-webview2-windows
        path: dist/mcc-webview2.exe
        if-no-files-found: error
