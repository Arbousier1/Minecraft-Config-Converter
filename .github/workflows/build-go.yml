name: Build Go

on:
  push:
    branches: [ "rewrite/go" ]
  pull_request:
    branches: [ "rewrite/go" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      CGO_ENABLED: 1
      CC: gcc

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Set up MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        path-type: inherit
        update: true
        install: mingw-w64-x86_64-gcc

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test ./...

    - name: Create dist directory
      run: New-Item -ItemType Directory -Force dist | Out-Null

    - name: Build desktop application binary
      run: go build -trimpath -ldflags "-s -w -H windowsgui" -o dist/mcc-desktop.exe ./cmd/mcc

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: mcc-desktop-windows
        path: dist/mcc-desktop.exe
        if-no-files-found: error
