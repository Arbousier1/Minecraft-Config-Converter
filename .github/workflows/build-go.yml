name: Build Go

on:
  push:
    branches: [ "rewrite/go" ]
  pull_request:
    branches: [ "rewrite/go" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Build all packages
      run: go build ./...

    - name: Run tests
      run: go test ./...

    - name: Create dist directory
      run: New-Item -ItemType Directory -Force dist | Out-Null

    - name: Build application binary
      run: go build -trimpath -ldflags "-s -w -H windowsgui" -o dist/mcc.exe ./cmd/mcc

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcc-go-rewrite-windows
        path: dist/mcc.exe
