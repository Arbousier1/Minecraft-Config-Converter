name: Build Go Rewrite

on:
  push:
    branches: [ "rewrite/go" ]
  pull_request:
    branches: [ "rewrite/go" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Build all packages
      run: go build ./...

    - name: Build application binary
      run: go build -o dist/mcc ./cmd/mcc

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcc-go-rewrite
        path: dist/mcc
