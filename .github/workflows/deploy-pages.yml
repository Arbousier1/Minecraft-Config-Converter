name: Deploy Pages Preview

on:
  push:
    branches: [ "rewrite/go" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Configure GitHub Pages with auto-enable
      if: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
      uses: actions/configure-pages@v5
      with:
        token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        enablement: true

    - name: Configure GitHub Pages
      if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
      uses: actions/configure-pages@v5

    - name: Build static preview
      run: |
        rm -rf _site
        mkdir -p _site
        cp web/pages/index.html _site/index.html
        cp web/pages/preview.js _site/preview.js
        cp -R web/static _site/static
        touch _site/.nojekyll

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
